name: Windows x64 native gate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-and-package:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: '1'
      NUGET_XMLDOC_MODE: skip

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore Node dependencies
        run: npm ci

      - name: Restore native solution
        run: dotnet restore native/EmsScout.Native.slnx -r win-x64

      - name: Validate packaging PowerShell syntax
        shell: pwsh
        run: |
          foreach ($path in 'scripts/new-test-signing-certificate.ps1',
                            'scripts/package-native.ps1',
                            'scripts/test-msix-install.ps1',
                            'scripts/verify-msix-signature.ps1') {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path -LiteralPath $path),
              [ref]$tokens,
              [ref]$errors)
            if ($errors.Count -gt 0) {
              throw "PowerShell syntax validation failed for ${path}: $($errors.Message -join '; ')"
            }
          }

      - name: Test contracts and Sidecar
        run: npm test

      - name: Test collector rules
        run: npm run self-test

      - name: Test native core
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/test-results | Out-Null
          & dotnet test native/tests/EmsScout.Tests/EmsScout.Tests.csproj `
            -c Release `
            --no-restore `
            /p:UseSharedCompilation=false `
            --filter 'Fixture!=ProductionEvidence' `
            --results-directory artifacts/test-results `
            --logger 'trx;LogFileName=native-release.trx'
          $nativeExitCode = $LASTEXITCODE
          if ($nativeExitCode -ne 0) {
            $trxPath = 'artifacts/test-results/native-release.trx'
            if (Test-Path -LiteralPath $trxPath) {
              [xml]$trx = Get-Content -LiteralPath $trxPath -Raw
              foreach ($result in @($trx.TestRun.Results.UnitTestResult | Where-Object outcome -eq 'Failed')) {
                $testName = [string]$result.testName
                $testName = $testName.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
                Write-Output "::error title=Native test failed::$testName"
              }
            }
            throw "Native tests failed with exit code $nativeExitCode"
          }

      - name: Verify native formatting
        run: dotnet format native/EmsScout.Native.slnx --verify-no-changes --no-restore

      - name: Audit vulnerable NuGet packages
        shell: pwsh
        run: |
          & dotnet list native/EmsScout.Native.slnx package --vulnerable --include-transitive 2>&1 |
            Tee-Object -FilePath artifacts/test-results/nuget-vulnerabilities.txt
          if ($LASTEXITCODE -ne 0) { throw "NuGet vulnerability audit failed with exit code $LASTEXITCODE" }

      - name: Verify migration and no-op idempotence
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/ci | Out-Null
          & node -e "const fs=require('fs');const Database=require('better-sqlite3');const db=new Database(process.argv[1]);db.exec(fs.readFileSync(process.argv[2],'utf8'));db.close();" `
            artifacts/ci/archived-core-v0.db tests/fixtures/schema-baselines/archived-core-v0.sql
          if ($LASTEXITCODE -ne 0) { throw "Synthetic migration fixture creation failed with exit code $LASTEXITCODE" }
          & dotnet run --project native/tools/EmsScout.SchemaTool/EmsScout.SchemaTool.csproj `
            -c Release --no-restore -- `
            migrate --db artifacts/ci/archived-core-v0.db --apply `
            --backup artifacts/ci/archived-core-v0.backup.db --json |
            Set-Content -LiteralPath artifacts/ci/migration-first.json -Encoding utf8
          if ($LASTEXITCODE -ne 0) { throw "First migration failed with exit code $LASTEXITCODE" }

          $before = (Get-FileHash artifacts/ci/archived-core-v0.db -Algorithm SHA256).Hash
          & dotnet run --project native/tools/EmsScout.SchemaTool/EmsScout.SchemaTool.csproj `
            -c Release --no-restore -- `
            migrate --db artifacts/ci/archived-core-v0.db --apply --json |
            Set-Content -LiteralPath artifacts/ci/migration-second.json -Encoding utf8
          if ($LASTEXITCODE -ne 0) { throw "Second migration failed with exit code $LASTEXITCODE" }
          $after = (Get-FileHash artifacts/ci/archived-core-v0.db -Algorithm SHA256).Hash
          if ($before -ne $after) { throw 'No-op migration changed the database content hash.' }

          $second = Get-Content -LiteralPath artifacts/ci/migration-second.json -Raw | ConvertFrom-Json
          if (@($second.appliedVersions).Count -ne 0) { throw 'Second migration was not a no-op.' }
          if ($null -ne $second.backupPath) { throw 'No-op migration created an unnecessary backup.' }

          & node scripts/audit-contracts.js artifacts/ci/archived-core-v0.db |
            Set-Content -LiteralPath artifacts/ci/contract-audit-migrated.json -Encoding utf8
          if ($LASTEXITCODE -ne 0) { throw "Migrated DB contract audit failed with exit code $LASTEXITCODE" }
          Remove-Item -LiteralPath artifacts/ci/archived-core-v0.db, artifacts/ci/archived-core-v0.backup.db -Force

      - name: Stage and smoke bundled Sidecar
        shell: pwsh
        run: ./scripts/prepare-sidecar.ps1

      - name: Create ephemeral test signing certificate
        id: test_signing
        shell: pwsh
        run: |
          $certificate = ./scripts/new-test-signing-certificate.ps1 -TrustForInstall
          "thumbprint=$($certificate.Thumbprint)" >> $env:GITHUB_OUTPUT

      - name: Build Windows x64 package
        shell: pwsh
        run: |
          ./scripts/package-native.ps1 `
            -Configuration Release `
            -SkipTests `
            -SkipSidecarPrepare `
            -PackageCertificateThumbprint '${{ steps.test_signing.outputs.thumbprint }}'

      - name: Install, launch, reinstall, and uninstall package
        shell: pwsh
        run: |
          try {
            ./scripts/test-msix-install.ps1 `
              -PackageRoot artifacts/packages/win-x64 `
              -OwnershipMarkerPath artifacts/ci/msix-install-owned.json `
              -ExpectedSignerThumbprint '${{ steps.test_signing.outputs.thumbprint }}'
          }
          catch {
            $message = $_.Exception.Message.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::error title=MSIX lifecycle failed::$message"
            throw
          }

      - name: Cleanup owned test package
        if: always()
        shell: pwsh
        run: |
          $ownershipMarker = 'artifacts/ci/msix-install-owned.json'
          if (Test-Path -LiteralPath $ownershipMarker) {
            $ownership = Get-Content -LiteralPath $ownershipMarker -Raw | ConvertFrom-Json
            if ($ownership.contractVersion -ne 'ems.msix-install-ownership/v1' -or
                $ownership.packageIdentityName -ne '1FACE092-146B-4AE5-83DB-3990E6AE8371') {
              throw 'MSIX install ownership marker is invalid.'
            }
            $ownedPackages = @(
              Get-ChildItem -LiteralPath artifacts/packages/win-x64 -Recurse -File -Filter '*.msix' |
                Where-Object { $_.FullName -notmatch '[\\/]Dependencies[\\/]' }
            )
            if ($ownedPackages.Count -ne 1) {
              throw "Expected one owned EMS Scout MSIX, found $($ownedPackages.Count)."
            }
            $ownedPackageHash = (Get-FileHash -LiteralPath $ownedPackages[0].FullName -Algorithm SHA256).Hash
            if ($ownedPackageHash -ne $ownership.packageSha256) {
              throw 'MSIX install ownership marker does not match the package artifact.'
            }
            Get-AppxPackage -Name $ownership.packageIdentityName -ErrorAction SilentlyContinue |
              Remove-AppxPackage -ErrorAction Stop
            if (Get-AppxPackage -Name $ownership.packageIdentityName -ErrorAction SilentlyContinue) {
              throw 'Owned EMS Scout package remained registered after cleanup.'
            }
            Remove-Item -LiteralPath $ownershipMarker -Force
          }

      - name: Cleanup test signing certificate
        if: always()
        shell: pwsh
        run: |
          $thumbprint = '${{ steps.test_signing.outputs.thumbprint }}'
          if (-not [string]::IsNullOrWhiteSpace($thumbprint)) {
            foreach ($store in 'Cert:\CurrentUser\My',
                                'Cert:\CurrentUser\TrustedPeople',
                                'Cert:\LocalMachine\Root') {
              $certificatePath = Join-Path $store $thumbprint
              if (Test-Path -LiteralPath $certificatePath) {
                Remove-Item -LiteralPath $certificatePath -Force
              }
            }
          }

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ems-scout-windows-x64-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            artifacts/test-results/**
            artifacts/ci/*.json
            artifacts/sidecar/win-x64/payload-manifest.json
            artifacts/packages/win-x64/**
            !**/*.pfx
            !**/*.pvk
